name: Weekly AI Report

on:
  schedule:
    - cron: '0 23 * * 0'   # 毎週日曜 23:00 UTC = 月曜 08:00 JST
  workflow_dispatch:         # GitHub UI から手動実行可能

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (fallback)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Japanese fonts
        run: python report/setup_fonts.py

      - name: Generate and send report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python report/main.py
