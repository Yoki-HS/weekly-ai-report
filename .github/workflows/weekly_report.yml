name: Weekly AI Report

on:
  schedule:
    - cron: '0 23 * * 0'   # 毎週日曜 23:00 UTC = 月曜 08:00 JST
  workflow_dispatch:         # GitHub UI から手動実行可能

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug - verify commit and code
        run: |
          echo "=== 現在のコミット ==="
          git log --oneline -3
          echo "=== fetcher.py の MODELS/FALLBACK_MODELS ==="
          grep -A 8 "MODELS\s*=" report/fetcher.py | head -20

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate and send report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python report/main.py
